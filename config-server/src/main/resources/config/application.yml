# ─────────────────────────────────────────────────────────────────────────────
# SHARED CONFIGURATION — applies to ALL microservices
# Override per-service by creating {SERVICE-NAME}.yml in this directory
# ─────────────────────────────────────────────────────────────────────────────

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: capsule-pharmacy-secret-key-very-long-and-secure-256-bit-key-here

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.capsulepharmacy: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: DEBUG
