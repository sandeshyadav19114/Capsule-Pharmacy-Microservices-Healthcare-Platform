# ─────────────────────────────────────────────────────────────────────────────
# API-MICROSERVICES.yml — Config for ApiMicroservicesApplication (port 8080)
# This is the API Gateway — single entry point for all client requests.
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: 8080

spring:
  application:
    name: API-MICROSERVICES

  cloud:
    gateway:
      # Global CORS configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

      # Default filters applied to ALL routes
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200

      routes:
        # ── User / Auth Service ───────────────────────────────────────────────
        - id: user-service
          uri: lb://USER-LOGIN-SIGNUP
          predicates:
            - Path=/api/auth/**,/api/users/**
          filters:
            - StripPrefix=0

        # ── Doctor Service ───────────────────────────────────────────────────
        - id: doctor-service
          uri: lb://DOCTOR
          predicates:
            - Path=/api/doctors/**
          filters:
            - StripPrefix=0

        # ── Patient Service ──────────────────────────────────────────────────
        - id: patient-service
          uri: lb://PATIENT
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=0

        # ── Booking Service ──────────────────────────────────────────────────
        - id: booking-service
          uri: lb://BOOKING
          predicates:
            - Path=/api/appointments/**,/api/bookings/**
          filters:
            - StripPrefix=0

        # ── Payment Service ──────────────────────────────────────────────────
        - id: payment-service
          uri: lb://PAYMENT
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0

        # ── Pharmacy Service ─────────────────────────────────────────────────
        - id: pharmacy-service
          uri: lb://PHARMACY-SERVICE
          predicates:
            - Path=/api/medicines/**,/api/prescriptions/**,/api/cart/**,/api/orders/**
          filters:
            - StripPrefix=0

        # ── Notification Service ─────────────────────────────────────────────
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0

      # Discovery-based load balancing
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

# Resilience4j for gateway-level circuit breaker
resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
