# ─────────────────────────────────────────────────────────────────────────────
# BOOKING.yml — Config for BookingApplication (port 8083)
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: 8083

spring:
  application:
    name: BOOKING

  datasource:
    url: jdbc:mysql://localhost:3306/booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

# Feign client timeout settings
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000
      doctor-service:
        connect-timeout: 3000
        read-timeout: 3000

# Resilience4j — Circuit Breaker on Doctor and Payment service calls
resilience4j:
  circuitbreaker:
    instances:
      doctorService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
      paymentService:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
  retry:
    instances:
      doctorService:
        max-attempts: 3
        wait-duration: 2s

# Appointment reminder job — runs daily at 7 AM to publish reminders to Kafka
scheduler:
  appointment-reminder:
    cron: "0 0 7 * * *"
    hours-before: 24

management:
  health:
    circuitbreakers:
      enabled: true

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
