# ─────────────────────────────────────────────────────────────────────────────
# PATIENT.yml — Config for PatientApplication (port 8082)
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: 8082

spring:
  application:
    name: PATIENT

  datasource:
    url: jdbc:mysql://localhost:3306/patient_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
