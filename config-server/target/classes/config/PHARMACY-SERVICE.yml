# ─────────────────────────────────────────────────────────────────────────────
# PHARMACY-SERVICE.yml — Config for PharmacyApplication (port 8085)
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: 8085

spring:
  application:
    name: PHARMACY-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/pharmacy_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# OpenAI — prescription OCR
openai:
  api:
    key: ${OPENAI_API_KEY:your-openai-api-key-here}
    url: https://api.openai.com/v1/chat/completions
    model: gpt-4-vision-preview
    max-tokens: 500

# AWS S3 — prescription image storage
aws:
  s3:
    bucket-name: capsule-pharmacy-prescriptions
    region: ap-south-1
  access-key: ${AWS_ACCESS_KEY:your-access-key}
  secret-key: ${AWS_SECRET_KEY:your-secret-key}

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      paymentService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
  retry:
    instances:
      paymentService:
        max-attempts: 3
        wait-duration: 2s

management:
  health:
    circuitbreakers:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
