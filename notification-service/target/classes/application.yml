server:
  port: 8086

spring:
  application:
    name: NOTIFICATION-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/notification_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: Sandesh19

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  # Email (SMTP) — update with real credentials or use Mailgun/SendGrid in prod
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:capsulepharmacy@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          timeout: 5000
          connection-timeout: 5000

  thymeleaf:
    prefix: classpath:/templates/email/
    suffix: .html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# Kafka topics this service listens to
kafka:
  topics:
    order-placed: order-placed-topic
    order-confirmed: order-confirmed-topic
    order-cancelled: order-cancelled-topic
    payment-completed: payment-completed-topic
    appointment-booked: appointment-booked-topic
    appointment-reminder: appointment-reminder-topic
    appointment-cancelled: appointment-cancelled-topic

# Notification config
notification:
  email:
    from: noreply@capsulepharmacy.com
    from-name: Capsule Pharmacy
  reminder:
    hours-before: 24   # Send reminder 24 hours before appointment

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: capsule-pharmacy-secret-key-very-long-and-secure-256-bit-key-here